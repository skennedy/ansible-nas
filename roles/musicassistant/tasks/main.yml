---
- name: Start Music Assistant
  block:
    - name: Create Music Assistant Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ musicassistant_data_directory }}/data"

    - name: Music Assistant Docker Container
      community.docker.docker_container:
        name: "{{ musicassistant_container_name }}"
        image: "{{ musicassistant_image_name }}:{{ musicassistant_image_version }}"
        pull: true
        volumes:
          - "{{ musicassistant_data_directory }}/data:/data:rw"
          - "{{ musicassistant_podcasts_directory }}:/podcasts:{{ musicassistant_podcasts_permissions }}"
          - "{{ musicassistant_music_directory }}:/music:{{ musicassistant_music_permissions }}"
          - "{{ musicassistant_audiobooks_directory }}:/audiobooks:{{ musicassistant_audiobooks_permissions }}"
        network_mode: host
        restart_policy: unless-stopped
        env:
          TZ: "{{ ansible_nas_timezone }}"
          LOG_LEVEL: "{{ musicassistant_log_level }}"
        labels:
          traefik.enable: "{{ musicassistant_available_externally | string }}"
          traefik.http.routers.musicassistant.rule: "Host(`{{ musicassistant_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.services.musicassistant.loadbalancer.server.port: "8095"
        memory: "{{ musicassistant_memory }}"
  when: musicassistant_enabled is true

- name: Stop Music Assistant
  block:
    - name: Stop Music Assistant
      community.docker.docker_container:
        name: "{{ musicassistant_container_name }}"
        state: absent
  when: musicassistant_enabled is false
